<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5566"/>
      <stop offset="100%" stop-color="#ff2442"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc1122"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#880011"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cubo isométrico -->
  <!-- Top face -->
  <polygon points="26,4 46,14 26,24 6,14" fill="url(#cubeTop)" filter="url(#glow)"/>
  <!-- Left face -->
  <polygon points="6,14 26,24 26,44 6,34" fill="url(#cubeLeft)"/>
  <!-- Right face -->
  <polygon points="26,24 46,14 46,34 26,44" fill="url(#cubeRight)"/>

  <!-- Outline edges rojo -->
  <polyline points="6,14 26,4 46,14 46,34 26,44 6,34 6,14" fill="none" stroke="#ff2442" stroke-width="0.8" opacity="0.7"/>
  <line x1="26" y1="4" x2="26" y2="24" stroke="#ff2442" stroke-width="0.6" opacity="0.5"/>
  <line x1="26" y1="24" x2="46" y2="14" stroke="#ff2442" stroke-width="0.6" opacity="0.35"/>
  <line x1="26" y1="24" x2="6" y2="14" stroke="#ff2442" stroke-width="0.6" opacity="0.35"/>

  <!-- "STL" texto -->
  <text x="60" y="34"
    font-family="'Space Grotesk', 'Inter', sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#ff2442"
    filter="url(#glow)">STL</text>

  <!-- "PREMIUM" texto -->
  <text x="63" y="47"
    font-family="'Space Grotesk', 'Inter', sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="4"
    fill="#666666">PREMIUM</text>
</svg>
